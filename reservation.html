<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Reservation | Osteria N.3</title>
    <meta name="description" content="Reserve your table at Osteria N.3. Book online for an authentic Italian dining experience.">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet" media="print" onload="this.media='all'">
    <noscript><link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet"></noscript>
    
    <style>
        :root{--primary:#b8860b;--primary-dark:#8b6508;--dark:#1a1a1a;--light:#f9f9f9;--gray:#666;--font-head:'Playfair Display',serif;--font-body:'Poppins',sans-serif}
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:var(--font-body);color:var(--dark);background:var(--light);line-height:1.6;overflow-x:hidden}
        h1,h2{font-family:var(--font-head);font-weight:600}
        .container{max-width:1200px;margin:0 auto;padding:0 20px}
        .btn{display:inline-block;background:var(--primary);color:#fff;padding:12px 30px;border-radius:40px;text-decoration:none;font-weight:500;transition:all 0.3s ease;border:none;cursor:pointer}
        .btn:hover{background:var(--primary-dark);transform:translateY(-3px);box-shadow:0 10px 20px rgba(0,0,0,0.1)}
        .nav{background:rgba(0,0,0,0.9);position:fixed;width:100%;top:0;z-index:1000;padding:15px 0}
        .nav .container{display:flex;justify-content:space-between;align-items:center}
        .logo{color:#fff;font-size:1.8rem;font-weight:700;text-decoration:none;font-family:var(--font-head)}
        .nav-links{display:flex;gap:30px;list-style:none}
        .nav-links a{color:#fff;text-decoration:none;font-weight:500;transition:color 0.3s}
        .nav-links a:hover,.nav-links a.active{color:var(--primary)}
        .mobile-menu{display:none;font-size:1.8rem;color:#fff;cursor:pointer}
        .res-hero{height:40vh;background:linear-gradient(rgba(0,0,0,0.5),rgba(0,0,0,0.5)),url('https://images.unsplash.com/photo-1517248135467-4c7edcad34c4?ixlib=rb-4.0.3&auto=format&fit=crop&w=2070&q=80') no-repeat center/cover;display:flex;align-items:center;text-align:center;color:#fff}
        .res-hero h1{font-size:3.5rem}
        .reservation-form{max-width:700px;margin:60px auto;background:#fff;padding:40px;border-radius:20px;box-shadow:0 20px 40px rgba(0,0,0,0.1)}
        .form-group{margin-bottom:20px}
        .form-group label{display:block;margin-bottom:8px;font-weight:500}
        .form-group input,.form-group select,.form-group textarea{width:100%;padding:12px 15px;border:1px solid #ddd;border-radius:8px;font-family:var(--font-body);font-size:1rem}
        .form-group input:focus,.form-group select:focus,.form-group textarea:focus{outline:none;border-color:var(--primary)}
        .form-row{display:grid;grid-template-columns:1fr 1fr;gap:20px}
        button[type="submit"]{width:100%;padding:14px;font-size:1.1rem}
        .footer{background:#000;color:#fff;text-align:center;padding:30px 0;margin-top:60px}
        .social-links a{color:#fff;margin:0 10px;font-size:1.5rem;text-decoration:none}
        @media(max-width:768px){.nav-links{position:fixed;top:70px;left:-100%;width:100%;height:calc(100vh - 70px);background:#000;flex-direction:column;align-items:center;padding-top:50px;transition:left 0.3s}.nav-links.active{left:0}.mobile-menu{display:block}.res-hero h1{font-size:2rem}.form-row{grid-template-columns:1fr}.reservation-form{padding:20px}}
    </style>
    <link rel="stylesheet" href="style.css" media="print" onload="this.media='all'">
    <noscript><link rel="stylesheet" href="style.css"></noscript>
</head>
<body>
    <nav class="nav">
        <div class="container">
            <a href="index.html" class="logo">Osteria N.3</a>
            <div class="mobile-menu">☰</div>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="about.html">About</a></li>
                <li><a href="menu.html">Menu</a></li>
                <li><a href="reservation.html" class="active">Reservation</a></li>
                <li><a href="contact.html">Contact</a></li>
            </ul>
        </div>
    </nav>

    <section class="res-hero">
        <div class="container">
            <h1>Reserve Your Table</h1>
            <p>Book online for an unforgettable Italian experience</p>
        </div>
    </section>

    <div class="container">
        <form id="reservation-form" class="reservation-form" action="https://formspree.io/f/YOUR_FORMSPREE_ID" method="POST">
            <div class="form-row">
                <div class="form-group">
                    <label>First Name *</label>
                    <input type="text" name="first_name" required>
                </div>
                <div class="form-group">
                    <label>Last Name *</label>
                    <input type="text" name="last_name" required>
                </div>
            </div>
            <div class="form-group">
                <label>Email Address *</label>
                <input type="email" name="email" required>
            </div>
            <div class="form-group">
                <label>Phone Number *</label>
                <input type="tel" name="phone" required>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>Date *</label>
                    <input type="date" name="date" required>
                </div>
                <div class="form-group">
                    <label>Time *</label>
                    <input type="time" name="time" required>
                </div>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>Number of Guests *</label>
                    <select name="guests" required>
                        <option value="1">1 guest</option>
                        <option value="2">2 guests</option>
                        <option value="3">3 guests</option>
                        <option value="4">4 guests</option>
                        <option value="5">5 guests</option>
                        <option value="6+">6+ guests</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Occasion (optional)</label>
                    <select name="occasion">
                        <option value="">-- Select --</option>
                        <option value="birthday">Birthday</option>
                        <option value="anniversary">Anniversary</option>
                        <option value="business">Business Dinner</option>
                        <option value="other">Other</option>
                    </select>
                </div>
            </div>
            <div class="form-group">
                <label>Special Requests or Dietary Restrictions</label>
                <textarea name="requests" rows="3" placeholder="Any allergies, preferences, or special notes..."></textarea>
            </div>
            <button type="submit" class="btn">Book Reservation</button>
        </form>
    </div>

    <footer class="footer">
        <div class="container">
            <p>© 2025 Osteria N.3. All rights reserved.</p>
            <div class="social-links">
                <a href="#" aria-label="Facebook">📘</a>
                <a href="#" aria-label="Instagram">📷</a>
                <a href="#" aria-label="Twitter">🐦</a>
            </div>
        </div>
    </footer>

    <script src="script.js" defer></script>
</body>
</html>
